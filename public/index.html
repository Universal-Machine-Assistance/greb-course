<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes"/>
  <title>greb-course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/magazine.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Monaco Editor loaded lazily by editor.cljs — not needed on mobile -->
</head>
<body>
  <div id="app-boot-loader" class="app-boot-loader" aria-busy="true" aria-label="Cargando">
    <div class="app-boot-inner">
      <div class="app-boot-spinner" aria-hidden="true"></div>
      <p class="app-boot-text">Cargando guía…</p>
    </div>
  </div>
  <div id="app"></div>
  <script>
    window.onerror=function(m,s,l,c,e){
      var d=document.createElement('pre');
      d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999999;background:red;color:#fff;font:12px/1.4 monospace;padding:12px;max-height:50vh;overflow:auto;white-space:pre-wrap';
      d.textContent='ERROR: '+m+'\n'+s+':'+l+':'+c+'\n'+(e&&e.stack||'');
      document.body.appendChild(d);
    };
    window.addEventListener('unhandledrejection',function(ev){
      var d=document.createElement('pre');
      d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999999;background:#a00;color:#fff;font:12px/1.4 monospace;padding:12px;max-height:50vh;overflow:auto;white-space:pre-wrap';
      d.textContent='UNHANDLED: '+(ev.reason&&ev.reason.stack||ev.reason||ev);
      document.body.appendChild(d);
    });
  </script>
  <script src="/js/main.js"></script>
</body>
</html>
